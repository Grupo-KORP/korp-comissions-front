<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cadastro </title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <header>
        <p>TESTE DE CADASTRO</p>
    </header>
    <main>
        <div id="modal">
            <h1>CADASTRE-SE</h1>
            <p>E-mail:</p>
            <input id="iptEmail" type="text">
            <p>Nome:</p>
            <input id="iptNome" type="text">
            <p>Senha:</p>
            <input id="iptSenha" type="text">
            <p>Confirme a senha:</p>
            <input id="iptConfirmarSenha" type="text">
            <button onclick="cadastrar()">CADASTRAR</button>
        </div>
    </main>
    <footer></footer>
</body>
</html>
<script src="app.js"></script>
